apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: task-manager-http-route
  namespace: task-manager
spec:
  parentRefs:
    - name: traefik-gateway
  hostnames:
    - "task-manager.local"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        -  name: frontend
           port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        -  name: backend
           port: 5000
    - matches:
        - path:
            type: PathPrefix
            value: /grafana
      backendRefs:
        - name: kube-prometheus-stack-grafana
          port: 81
