name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: read # allows SonarCloud to decorate PRs with analysis results

jobs:

  sonarqube:
    environment: task-manager-app-env
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          
  backend-tests:
    runs-on: ubuntu-latest
    needs: sonarqube
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install backend dependencies
        run: cd backend && npm install
      - name: Run backend tests
        run: cd backend && npm test
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: password
          DB_NAME: testdb
          USE_TEST_DB: "true"  # Use test database
        
  frontend-tests:
    runs-on: ubuntu-latest
    needs: sonarqube
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install frontend dependencies
        run: cd frontend && npm install
      - name: Run frontend tests
        run: cd frontend && npm test -- --watchAll=false

  e2e-tests:
    runs-on: ubuntu-latest
    needs: sonarqube
    steps:
      - uses: actions/checkout@v3
  
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
  
      - name: Install dependencies (for building images if needed)
        run: |
          cd backend && npm install
          cd ../frontend && npm install
  
      - name: Build Docker images
        run: |
          docker build -t task-manager-backend:latest ./backend
          docker build -t task-manager-frontend:latest ./frontend
  
      - name: Start services with Docker Compose
        run: |
          docker compose -f docker-compose.e2e.yml up -d
          # Wait for services to be healthy
          npx wait-on http://localhost:5000/health http://localhost:3000 --timeout 60000
  
      - name: Run Cypress tests
        uses: cypress-io/github-action@v7
        with:
          working-directory: frontend
          browser: electron
          # config: baseUrl=http://localhost:3003
          install: false
          supportFile: false
  
      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v

  push-to-docker-hub:
    environment: task-manager-app-env
    runs-on: ubuntu-latest
    needs: [sonarqube, backend-tests, frontend-tests, e2e-tests]
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Log in to Docker Hub
        uses: docker/login-action@f4ef78c080cd8ba55a85445d5b36e214a81df20a
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: oldbonebro/task-manager-app-frontend

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@3b5e8027fcad23fda98b2e3ac259d8d67585f671
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-name: index.docker.io/oldbonebro/task-manager-app-frontend
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      
      
    
