name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: read

jobs:

  sonarqube:
    environment: task-manager-app-env
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          
  backend-tests:
    runs-on: ubuntu-latest
    needs: sonarqube
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install backend dependencies
        run: cd backend && npm install
      - name: Run backend tests
        run: cd backend && npm test
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: password
          DB_NAME: testdb
          USE_TEST_DB: "true"
        
  frontend-tests:
    runs-on: ubuntu-latest
    needs: sonarqube
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install frontend dependencies
        run: cd frontend && npm install
      - name: Run frontend tests
        run: cd frontend && npm test -- --watchAll=false

  e2e-tests:
    runs-on: ubuntu-latest
    needs: sonarqube
    steps:
      - uses: actions/checkout@v3
  
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
  
      - name: Install dependencies
        run: |
          cd backend && npm install
          cd ../frontend && npm install
  
      - name: Build Docker images for E2E tests (with localhost API URL)
        run: |
          docker build \
            --build-arg REACT_APP_API_URL=http://localhost:5000 \
            -t task-manager-backend:latest \
            ./backend
          docker build \
            --build-arg REACT_APP_API_URL=http://localhost:5000 \
            -t task-manager-frontend:latest \
            ./frontend
  
      - name: Start services with Docker Compose
        run: |
          docker compose -f docker-compose.e2e.yml up -d
          npx wait-on http://localhost:5000/health http://localhost:3000 --timeout 60000
  
      - name: Run Cypress tests
        uses: cypress-io/github-action@v7
        with:
          working-directory: frontend
          browser: electron
          install: false
          supportFile: false
  
      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v

  push-to-docker-hub:
    environment: task-manager-app-env
    runs-on: ubuntu-latest
    needs: [sonarqube, backend-tests, frontend-tests, e2e-tests]
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Log in to Docker Hub
        uses: docker/login-action@f4ef78c080cd8ba55a85445d5b36e214a81df20a
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build frontend for Kubernetes (with backend service URL)
      - name: Extract metadata for frontend (K8s build)
        id: meta-frontend
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: oldbonebro/task-manager-app-frontend
          tags: |
            type=raw,value=latest
            type=raw,value=k8s
            type=sha,format=short

      - name: Build and push frontend image for Kubernetes
        id: push-frontend
        uses: docker/build-push-action@3b5e8027fcad23fda98b2e3ac259d8d67585f671
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            REACT_APP_API_URL=http://task-manager.local/api

      # Build frontend for local development (optional, as backup)
      - name: Build and push frontend image for local dev
        uses: docker/build-push-action@3b5e8027fcad23fda98b2e3ac259d8d67585f671
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: oldbonebro/task-manager-app-frontend:local-dev
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            REACT_APP_API_URL=http://localhost:5000/api

      # Build backend (no build args needed)
      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: oldbonebro/task-manager-app-backend
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push backend image
        id: push-backend
        uses: docker/build-push-action@3b5e8027fcad23fda98b2e3ac259d8d67585f671
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}

      - name: Generate artifact attestation for backend
        uses: actions/attest@v4
        with:
          subject-name: index.docker.io/oldbonebro/task-manager-app-backend
          subject-digest: ${{ steps.push-backend.outputs.digest }}
          push-to-registry: true
