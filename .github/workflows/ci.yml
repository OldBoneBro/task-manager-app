name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install backend dependencies
        run: cd backend && npm install
      - name: Run backend tests
        run: cd backend && npm test
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: password
          DB_NAME: testdb
          USE_TEST_DB: "true"  # Use test database
        
  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install frontend dependencies
        run: cd frontend && npm install
      - name: Run frontend tests
        run: cd frontend && npm test -- --watchAll=false

  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
  
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
  
      - name: Install dependencies (for building images if needed)
        run: |
          cd backend && npm install
          cd ../frontend && npm install
  
      - name: Build Docker images
        run: |
          docker build -t task-manager-backend:latest ./backend
          docker build -t task-manager-frontend:latest ./frontend
  
      - name: Start services with Docker Compose
        run: |
          docker compose -f docker-compose.e2e.yml up -d
          # Wait for services to be healthy
          npx wait-on http://localhost:5003/health http://localhost:3003 --timeout 60000
  
      - name: Run Cypress tests
        uses: cypress-io/github-action@v5
        with:
          working-directory: frontend
          config: baseUrl=http://localhost:3003
          browser: chrome
          headless: true
  
      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v
    
