services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: testdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: task-manager-backend:latest
    build: ./backend  
    ports:
      - "5000:5000" 
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: testdb
      DB_PORT: 5432
      PORT: 5000
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: task-manager-frontend:latest
    build: 
      context: ./frontend
      args:
        REACT_APP_API_URL: http://localhost:5000/api  # important: uses host port
    ports:
      - "3000:80"  # map to a new host port
